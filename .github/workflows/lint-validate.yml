name: Lint & Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feat/**"

jobs:
  terraform-validate:
    name: Terraform Validate & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform Init (dry-run, no backend)
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        working-directory: terraform/environments/${{ matrix.env }}
        run: |
          tflint --init
          tflint --recursive

  checkov-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli
          skip_check: CKV_TF_1  # module pinning (we use local modules)

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Helm Lint (default values)
        run: |
          helm lint helm/charts/app-template/

      - name: Helm Lint (dev values)
        run: |
          helm lint helm/charts/app-template/ \
            -f helm/charts/app-template/values.yaml \
            -f helm/charts/app-template/values-dev.yaml

      - name: Helm Template (dry-run render)
        run: |
          helm template test-release helm/charts/app-template/ \
            -f helm/charts/app-template/values.yaml \
            -f helm/charts/app-template/values-dev.yaml \
            --set api.image.repository=test/image \
            --set worker.image.repository=test/image \
            --set ingress.host=test.dev.internal \
            --debug

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 150
                level: warning
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ['true', 'false']
          file_or_dir: |
            argocd/
            helm/
            .github/workflows/

  argocd-validate:
    name: ArgoCD Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz && mv kubeconform /usr/local/bin/

      - name: Validate ArgoCD manifests
        run: |
          find argocd/ -name "*.yaml" | xargs kubeconform \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas \
            -summary
